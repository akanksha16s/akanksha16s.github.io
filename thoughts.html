        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;

            margin: 0 auto;

        }

        /* Navigation */
        nav {
            display: flex;
            justify-content: space-between;

            margin-left: 20px;
            text-decoration: none;
            color: var(--secondary);
            font-size: 0.9em;
        }

        .nav-links a:hover { color: var(--text); }
        .nav-links a.active { color: var(--text); font-weight: 600; }

        /* Header */
        header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 40px;
        }

        /* Thoughts List */
        .thought-entry {
            margin-bottom: 50px;
            padding-bottom: 20px;
        }

        .date {
            font-size: 0.85em;
            color: var(--secondary);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 10px;
            display: block;
        }

        .content {
            font-size: 1.1rem;
            color: var(--text);
        }

        footer {
            margin-top: 100px;
            padding: 40px 0;
            border-top: 1px solid var(--border);
            font-size: 0.85em;
            color: var(--secondary);
            text-align: center;
        }

        @media (max-width: 600px) {
            nav { flex-direction: column; align-items: flex-start; gap: 20px; }
            .nav-links a { margin-left: 0; margin-right: 15px; }
        }
    </style>
</head>
