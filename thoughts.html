<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>akanksha writes | thoughts</title>
    <style>
        /* (Use the same CSS from index.html) */
        :root { --bg: #ffffff; --text: #1a1a1a; --secondary: #666666; --border: #eaeaea; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); max-width: 750px; margin: 0 auto; padding: 40px 20px; line-height: 1.6; }
        nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 80px; }
        .logo { font-weight: 700; text-decoration: none; color: var(--text); }
        .nav-links a { margin-left: 20px; text-decoration: none; color: var(--secondary); font-size: 0.9em; }
        .nav-links a:hover, .nav-links a.active { color: var(--text); font-weight: 600; }
        header h1 { font-size: 2.5rem; margin-bottom: 40px; }
        .thought-entry { margin-bottom: 60px; }
        .date { font-size: 0.85em; color: var(--secondary); margin-bottom: 10px; display: block; text-transform: uppercase; letter-spacing: 0.05em;}
        .content { font-size: 1.1rem; color: var(--text); }
        .poem { font-style: italic; white-space: pre-wrap; border-left: 1px solid var(--border); padding-left: 20px; color: var(--secondary); }
        footer { margin-top: 100px; padding: 40px 0; border-top: 1px solid var(--border); font-size: 0.85em; color: var(--secondary); text-align: center; }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">akanksha.</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="thoughts.html" class="active">Thoughts</a>
        </div>
    </nav>

    <header>
        <h1>Thoughts</h1>
    </header>

    <main>
        <article class="thought-entry">
            <span class="date">March 24, 2026</span>
            <div class="content">
                This is a space for raw bits of mind. Sometimes a status, sometimes a poem.
            </div>
        </article>

        <article class="thought-entry">
            <span class="date">March 20, 2026</span>
            <div class="content poem">
the mountains don't ask
they just listen
while the climate changes
and the farmers keep sowing
            </div>
        </article>
    </main>

    <footer>
        © 2026 Akanksha • Built with simplicity ♡
    </footer>

</body>
</html>
