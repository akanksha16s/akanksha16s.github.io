<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Akanksha</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:ital,wght@0,600;1,600&display=swap" rel="stylesheet">
    <style>
        /* Midnight Dark Theme Variables */
        :root { 
            --bg: #0f0f0f; 
            --text: #eeeeee; 
            --secondary: #999999; 
            --border: #222222; 
            --accent: #ffffff;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: var(--text); 
            max-width: 750px; 
            margin: 0 auto; 
            padding: 40px 20px; 
            line-height: 1.6; 
        }

        nav { display: flex; justify-content: space-between; align-items: center; margin-bottom: 120px; }
        .logo { font-weight: 700; text-decoration: none; color: var(--text); letter-spacing: -0.5px; }
        .nav-links a { margin-left: 20px; text-decoration: none; color: var(--secondary); font-size: 0.9em; transition: 0.3s; }
        .nav-links a:hover, .nav-links a.active { color: var(--text); font-weight: 600; }

        .hero { margin-bottom: 60px; }
        .hero h1 { 
            font-family: 'Playfair Display', serif; 
            font-size: 3rem; 
            line-height: 1.1; 
            margin-bottom: 20px; 
            letter-spacing: -1px;
            color: var(--accent);
        }
        .hero p { color: var(--secondary); font-size: 1.1rem; max-width: 500px; margin-bottom: 40px; }

        /* The New Action Button */
        .cta-button {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--accent);
            color: #000;
            padding: 14px 28px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: all 0.2s ease;
        }
        .cta-button:hover { transform: scale(1.03); background: #e0e0e0; }

        footer { margin-top: 150px; padding: 40px 0; border-top: 1px solid var(--border); font-size: 0.85em; color: var(--secondary); text-align: center; }

        @media (max-width: 600px) {
            .hero h1 { font-size: 2.2rem; }
            nav { margin-bottom: 60px; }
        }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">akanksha.</a>
        <div class="nav-links">
            <a href="index.html" class="active">Home</a>
            <a href="thoughts.html">Thoughts</a>
            <a href="https://x.com/your-username" target="_blank">X</a>
        </div>
    </nav>

    <main>
        <section class="hero">
            <h1>Writer, observer, and occasional satirist.</h1>
            <p>Exploring the intersection of Himalayan life, environmental thoughts, and the absurdity of daily human habits.</p>
            
            <a href="thoughts.html" class="cta-button">
                Read my thoughts <span>→</span>
            </a>
        </section>
    </main>

    <footer>
        © 2026 Akanksha • Built with simplicity ♡
    </footer>

</body>
</html>
